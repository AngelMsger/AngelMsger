<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 358" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Consolas, monospace" role="img" aria-label="Terminal: whoami — Haotian Chyi. Mission: Turn Unthinkable to Reality.">
  <style>
    .win { filter: url(#glow); }
    .t1 { animation: type1 .64s steps(8, end) .4s both; }
    .t2 { animation: type2 .96s steps(16, end) 3s both; }
    .t3 { animation: type3 1.5s steps(30, end) 4.2s both; }
    @keyframes type1 { from { width: 0; } to { width: 72px; } }
    @keyframes type2 { from { width: 0; } to { width: 144px; } }
    @keyframes type3 { from { width: 0; } to { width: 270px; } }
    .name { animation: flickerIn .6s ease-out 1.3s both; }
    @keyframes flickerIn { 0% { opacity: 0; } 18% { opacity: 1; } 30% { opacity: 0; } 46% { opacity: 1; } 62% { opacity: .35; } 100% { opacity: 1; } }
    .g1, .g2 { opacity: 0; }
    .g1 { animation: glitchA 3.4s steps(2) 2s infinite; }
    .g2 { animation: glitchB 3.4s steps(2) 2.2s infinite; }
    @keyframes glitchA {
      0% { opacity: .8; clip-path: inset(0 0 72% 0); transform: translate(-3px, -2px); }
      4% { clip-path: inset(38% 0 34% 0); transform: translate(3px, 1px); }
      8% { clip-path: inset(68% 0 6% 0); transform: translate(-2px, 1px); }
      12%, 100% { opacity: 0; clip-path: inset(0 0 0 0); transform: none; }
    }
    @keyframes glitchB {
      0% { opacity: .8; clip-path: inset(66% 0 8% 0); transform: translate(3px, 2px); }
      4% { clip-path: inset(12% 0 62% 0); transform: translate(-3px, -1px); }
      8% { clip-path: inset(44% 0 28% 0); transform: translate(2px, -1px); }
      12%, 100% { opacity: 0; clip-path: inset(0 0 0 0); transform: none; }
    }
    .sub { animation: fadeIn .6s ease-out 2.1s both; }
    .prompt { animation: fadeIn .01s linear 6s both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .cursor { animation: blink 1.05s steps(1) 6s infinite; }
    .rec { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .t1, .t2, .t3, .name, .sub, .prompt, .cursor, .rec { animation: none; }
      .g1, .g2 { animation: none; opacity: 0; }
    }
  </style>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset=".55" stop-color="#29e0ff"/>
      <stop offset="1" stop-color="#ff3d81"/>
    </linearGradient>
    <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="rgba(255,255,255,.035)"/>
    </pattern>
    <filter id="glow" x="-5%" y="-5%" width="110%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#29e0ff" flood-opacity=".14"/>
    </filter>
    <mask id="m1"><rect class="t1" x="46" y="76" width="72" height="24" fill="#fff"/></mask>
    <mask id="m2"><rect class="t2" x="46" y="216" width="144" height="24" fill="#fff"/></mask>
    <mask id="m3"><rect class="t3" x="46" y="248" width="270" height="24" fill="#fff"/></mask>
    <clipPath id="winClip"><rect x="18" y="14" width="824" height="330" rx="12"/></clipPath>
  </defs>

  <!-- window -->
  <rect class="win" x="18" y="14" width="824" height="330" rx="12" fill="#0b0b18" stroke="rgba(41,224,255,.28)"/>

  <!-- title bar -->
  <g clip-path="url(#winClip)">
    <rect x="18" y="14" width="824" height="38" fill="rgba(255,255,255,.025)"/>
  </g>
  <line x1="18" y1="52" x2="842" y2="52" stroke="rgba(255,255,255,.08)"/>
  <circle cx="42" cy="33" r="5.5" fill="#ff5f56"/>
  <circle cx="62" cy="33" r="5.5" fill="#ffbd2e"/>
  <circle cx="82" cy="33" r="5.5" fill="#27c93f"/>
  <text x="102" y="38" font-size="13" fill="#6b7590">haotian@arch — zsh</text>
  <circle class="rec" cx="694" cy="33" r="4.5" fill="#ff3b3b"/>
  <text x="706" y="38" font-size="12" fill="#cbd5f0">REC <tspan fill="#6b7590">· 8K · 24fps</tspan></text>

  <!-- session -->
  <g font-size="15">
    <text x="46" y="92" fill="#cfe3ff" textLength="72" mask="url(#m1)">$ whoami</text>

    <g class="name">
      <text class="g1" x="46" y="158" font-size="46" font-weight="700" fill="#ff3d81" textLength="400" lengthAdjust="spacingAndGlyphs">HAOTIAN CHYI</text>
      <text class="g2" x="46" y="158" font-size="46" font-weight="700" fill="#29e0ff" textLength="400" lengthAdjust="spacingAndGlyphs">HAOTIAN CHYI</text>
      <text x="46" y="158" font-size="46" font-weight="700" fill="url(#grad)" textLength="400" lengthAdjust="spacingAndGlyphs">HAOTIAN CHYI</text>
    </g>
    <text class="sub" x="46" y="190" font-size="13" fill="#9aa6c4">@AngelMsger · backend leader @ <tspan fill="#eef2ff">FineX</tspan> / FanRuan · Tokyo, Japan</text>

    <text x="46" y="232" fill="#cfe3ff" textLength="144" mask="url(#m2)">$ cat ~/.mission</text>
    <text x="46" y="264" fill="#46f7a0" textLength="270" mask="url(#m3)">&gt; Turn Unthinkable to Reality.</text>

    <g class="prompt">
      <text x="46" y="306" fill="#46f7a0">$</text>
      <rect class="cursor" x="64" y="291" width="9" height="18" fill="#29e0ff"/>
    </g>
  </g>

  <!-- scanlines -->
  <rect x="18" y="14" width="824" height="330" rx="12" fill="url(#scan)"/>
</svg>
